<html>
	<head>
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>SpeechRecog</title>
		<style>
			body {
			background-color:rgb(112, 122, 255);
			}
			button{
			position: absolute;
			bottom: 10px;
			background-color:rgb(44, 56, 219);
			border-radius: 50%;
			height:70px;
			width:70px;
			margin-left: -35px; /*35px is half of the button's width*/
			}
		</style>
	</head>
	<body align="center" >
		<button id="start"></button>
		<p id="output"></p>
		<script type="text/javascript">
			var SpeechRecognition = SpeechRecognition || webkitSpeechRecognition;
			var SpeechGrammarList = SpeechGrammarList || webkitSpeechGrammarList;
			var SpeechRecognitionEvent = SpeechRecognitionEvent || webkitSpeechRecognitionEvent;
			var colors = [];
			var grammar = '#JSGF V1.0; grammar colors; public <color> = ' + colors.join(' | ') + ' ;'
			var recognition = new SpeechRecognition();
			var speechRecognitionList = new SpeechGrammarList();
			speechRecognitionList.addFromString(grammar, 1);
			recognition.grammars = speechRecognitionList;
			recognition.continuous = false;
			recognition.lang = 'en-US';
			recognition.interimResults = false;
			recognition.maxAlternatives = 1;
			document.getElementById("start").onclick=function() {
				recognition.start();
			}
			recognition.onresult = function(event) {
				var col=event.results[0][0].transcript;
				document.getElementById("output").innerHTML=col;
				document.querySelector('html').style.backgroundColor=col;
				document.querySelector('body').style.backgroundColor=col;
				if(col==="weather"){
					document.getElementById("output").innerHTML="Weather is ";
				}
			}
			recognition.onspeechend = function() {
				recognition.stop();
			}
			recognition.onerror = function(event) {
				window.alert(event.error);
			}
		</script>
	</body>
</html>
